name: Build Bomb Synth

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
          - name: Linux
            os: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
          libcurl4-openssl-dev libfreetype6-dev libx11-dev libxcomposite-dev \
          libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
          libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

    - name: Configure
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Package (macOS)
      if: runner.os == 'macOS'
      run: |
        cd "build/Source/BombSynth_artefacts/Release/VST3"
        zip -r BombSynth-macOS.zip "Bomb Synth.vst3"
        mv BombSynth-macOS.zip ../../../../../

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        cd "build\Source\BombSynth_artefacts\Release\VST3"
        7z a BombSynth-Windows.zip "Bomb Synth.vst3"
        move BombSynth-Windows.zip ..\..\..\..\..\

    - name: Package (Linux)
      if: runner.os == 'Linux'
      run: |
        cd "build/Source/BombSynth_artefacts/Release/VST3"
        zip -r BombSynth-Linux.zip "Bomb Synth.vst3"
        mv BombSynth-Linux.zip ../../../../../

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BombSynth-${{ matrix.name }}
        path: BombSynth-*.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BombSynth-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
